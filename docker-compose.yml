services:
  db:
    image: postgres:16-alpine
    container_name: evaluaia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evaluacion_ia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evaluacion_ia"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: evaluaia-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/evaluacion_ia?schema=public
      JWT_SECRET: ${JWT_SECRET:-cambiar-este-secreto-en-produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      RUN_SEED: ${RUN_SEED:-true}
      NODE_ENV: production
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    container_name: evaluaia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
